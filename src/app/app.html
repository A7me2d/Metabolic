<div class="app-shell">
  <div class="app-layer">
    @if (isLoading()) {
      <div class="min-h-screen flex items-center justify-center px-6">
        <div class="glass-panel rounded-[2rem] px-10 py-12 text-center">
          <div class="mx-auto mb-4 h-12 w-12 animate-spin rounded-full border-4 border-emerald-400/40 border-t-emerald-300"></div>
          <p class="text-lg font-semibold text-white">Loading your performance hub</p>
          <p class="mt-2 text-sm text-slate-400">Syncing profile, targets, and daily tracking.</p>
        </div>
      </div>
    } @else if (!isLoggedIn()) {
      <app-onboarding />
    } @else {
      <app-dashboard />

      <div id="manual-entry-section" class="px-4 pb-28 md:px-6">
        <div class="mx-auto max-w-6xl">
          <app-manual-entry />
        </div>
      </div>

      <div class="fixed bottom-5 right-4 z-40 md:bottom-8 md:right-8">
        @if (showAddMenu()) {
          <div class="absolute bottom-20 right-0 mb-2 flex min-w-52 flex-col gap-3">
            <button
              (click)="openCamera()"
              class="glass-panel flex items-center gap-3 rounded-2xl px-4 py-3 text-left text-white transition duration-300 hover:-translate-y-0.5 hover:border-emerald-300/40">
              <span class="flex h-11 w-11 items-center justify-center rounded-2xl bg-emerald-400/15 text-emerald-300">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
              </span>
              <span>
                <span class="block text-sm font-semibold">Scan food</span>
                <span class="block text-xs text-slate-400">Use AI to estimate your macros fast.</span>
              </span>
            </button>

            <button
              (click)="openManualEntry()"
              class="glass-panel flex items-center gap-3 rounded-2xl px-4 py-3 text-left text-white transition duration-300 hover:-translate-y-0.5 hover:border-sky-300/40">
              <span class="flex h-11 w-11 items-center justify-center rounded-2xl bg-sky-400/15 text-sky-300">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
              </span>
              <span>
                <span class="block text-sm font-semibold">Manual entry</span>
                <span class="block text-xs text-slate-400">Log meals and supplements with precision.</span>
              </span>
            </button>
          </div>
        }

        <button
          (click)="toggleAddMenu()"
          class="flex h-16 w-16 items-center justify-center rounded-[1.6rem] bg-linear-to-br from-emerald-400 via-lime-300 to-orange-400 text-slate-950 shadow-[0_22px_60px_rgba(74,222,128,0.45)] transition duration-300 hover:scale-105"
          [class.rotate-45]="showAddMenu()">
          <svg class="h-7 w-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.4" d="M12 4v16m8-8H4"/>
          </svg>
        </button>
      </div>

      @if (showCamera()) {
        <div class="fixed inset-0 z-50 flex flex-col bg-slate-950/95 p-4 backdrop-blur-xl">
          <button
            (click)="showCamera.set(false)"
            class="absolute right-4 top-4 rounded-full border border-white/10 bg-white/5 p-2 text-white/70 transition hover:text-white">
            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
          <div class="mx-auto flex w-full max-w-3xl flex-1 items-center justify-center">
            <app-camera
              (imageCaptured)="onImageCaptured($event)"
              (cameraError)="showCamera.set(false)" />
          </div>
        </div>
      }

      @if (showConfirmModal()) {
        <app-food-confirm-modal
          [result]="lastAiResult()"
          [imageBase64]="lastCapturedImage()"
          [(visible)]="showConfirmModal"
          (confirmed)="onFoodConfirmed($event)"
          (cancelled)="onFoodCancelled()" />
      }
    }
  </div>
</div>
